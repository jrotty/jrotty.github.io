<body class="bg-gradient-to-br from-blue-50 to-indigo-50 min-h-screen flex flex-col items-center justify-center p-4 font-sans">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8 md:p-10 transform transition-all duration-500 hover:shadow-xl">
        <!-- 图标 -->
        <div class="text-center mb-6">
            🔗
        </div>
        
        <!-- 标题 -->
        <h1 class="text-[clamp(1.5rem,5vw,2.5rem)] font-bold text-gray-800 text-center mb-4 text-shadow">
            泽泽社长最新域名(备案中)
        </h1>
        
        <!-- 域名显示 -->
        <div class="bg-blue-50 rounded-xl p-5 mb-8 text-center border border-blue-100">
            <p id="domain" class="text-[clamp(1.2rem,4vw,2rem)] font-mono text-primary break-all">
                aintr.cn
            </p>
        </div>
        
        <!-- 倒计时信息 -->
        <div class="text-center text-gray-600">
            <p class="mb-2">
                页面将在 <span id="countdown" class="font-bold text-secondary text-xl">5</span> 秒后自动跳转
            </p>
            <p class="text-sm text-gray-500">
                或 <a href="https://aintr.cn" class="text-primary hover:text-secondary transition-all-300 underline">点击此处立即访问</a>
            </p>
        </div>
    </div>
    
    <!-- 页脚 -->
    <footer class="mt-8 text-center text-gray-500 text-sm">
        <p>如果长时间未跳转，请手动复制上方域名访问</p>
    </footer>

    <script>
        // 设置最新域名（可在此处修改为实际域名）
        const latestDomain = "aintr.cn";
        const domainElement = document.getElementById('domain');
        const countdownElement = document.getElementById('countdown');
        
        // 更新显示的域名
        domainElement.textContent = latestDomain;
        // 更新链接
        document.querySelector('a').href = `https://${latestDomain}`;
        
        // 倒计时功能
        let countdown = 5;
        const countdownInterval = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;
            
            // 添加数字变化动画
            countdownElement.classList.add('scale-110');
            setTimeout(() => {
                countdownElement.classList.remove('scale-110');
            }, 200);
            
            if (countdown <= 0) {
                clearInterval(countdownInterval);
                // 跳转到最新域名
                window.location.href = `https://${latestDomain}`;
            }
        }, 1000);
    </script>
</body>
